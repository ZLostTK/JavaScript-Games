<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" fill="none">
  <!-- Fondo -->
  <rect width="400" height="200" fill="#1a2a5e"/>

  <!-- Agujeros de la cuadrícula -->
  <g fill="#0f0f1a">
    <!-- Fila 1 (superior) -->
    <circle cx="57" cy="35" r="18"/>
    <circle cx="114" cy="35" r="18"/>
    <circle cx="171" cy="35" r="18"/>
    <circle cx="228" cy="35" r="18"/>
    <circle cx="285" cy="35" r="18"/>
    <circle cx="342" cy="35" r="18"/>
    <!-- Fila 2 -->
    <circle cx="57" cy="80" r="18"/>
    <circle cx="114" cy="80" r="18"/>
    <circle cx="171" cy="80" r="18"/>
    <circle cx="228" cy="80" r="18"/>
    <circle cx="285" cy="80" r="18"/>
    <circle cx="342" cy="80" r="18"/>
    <!-- Fila 3 -->
    <circle cx="57" cy="125" r="18"/>
    <circle cx="114" cy="125" r="18"/>
    <circle cx="171" cy="125" r="18"/>
    <circle cx="228" cy="125" r="18"/>
    <circle cx="285" cy="125" r="18"/>
    <circle cx="342" cy="125" r="18"/>
    <!-- Fila 4 (inferior) -->
    <circle cx="57" cy="170" r="18"/>
    <circle cx="114" cy="170" r="18"/>
    <circle cx="171" cy="170" r="18"/>
    <circle cx="228" cy="170" r="18"/>
    <circle cx="285" cy="170" r="18"/>
    <circle cx="342" cy="170" r="18"/>
  </g>

  <!-- Fichas rojas -->
  <circle cx="57" cy="170" r="18" fill="#e94560"/>
  <circle cx="114" cy="170" r="18" fill="#e94560"/>
  <circle cx="114" cy="125" r="18" fill="#e94560"/>
  <circle cx="171" cy="170" r="18" fill="#e94560"/>
  <circle cx="171" cy="125" r="18" fill="#e94560"/>
  <circle cx="171" cy="80" r="18" fill="#e94560"/>

  <!-- Fichas amarillas normales (columna 4 y 5) -->
  <circle cx="228" cy="170" r="18" fill="#f5c518"/>
  <circle cx="228" cy="125" r="18" fill="#f5c518"/>
  <circle cx="228" cy="80" r="18" fill="#f5c518"/>
  <circle cx="285" cy="170" r="18" fill="#f5c518"/>
  <circle cx="285" cy="125" r="18" fill="#f5c518"/>

  <!-- Fichas amarillas de la columna 6 (columna ganadora) -->
  <!-- Fila 1 -->
  <circle cx="342" cy="35" r="18" fill="#ffe033"/>
  <circle cx="342" cy="35" r="22" fill="none" stroke="#ffe033" stroke-width="3" opacity="0.6"/>
  <!-- Fila 2 -->
  <circle cx="342" cy="80" r="18" fill="#ffe033"/>
  <circle cx="342" cy="80" r="22" fill="none" stroke="#ffe033" stroke-width="3" opacity="0.6"/>
  <!-- Fila 3 -->
  <circle cx="342" cy="125" r="18" fill="#ffe033"/>
  <circle cx="342" cy="125" r="22" fill="none" stroke="#ffe033" stroke-width="3" opacity="0.6"/>
  <!-- Fila 4 -->
  <circle cx="342" cy="170" r="18" fill="#ffe033"/>
  <circle cx="342" cy="170" r="22" fill="none" stroke="#ffe033" stroke-width="3" opacity="0.6"/>
</svg>