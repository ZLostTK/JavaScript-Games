<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Fondo cielo nocturno -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a3a5e"/>
    </linearGradient>
    <linearGradient id="pipe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#1a5c1a"/>
      <stop offset="40%"  stop-color="#3db87a"/>
      <stop offset="100%" stop-color="#1a5c1a"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#4da830"/>
      <stop offset="100%" stop-color="#3d2510"/>
    </linearGradient>
  </defs>

  <!-- Cielo -->
  <rect width="200" height="200" fill="url(#sky)"/>

  <!-- Estrellas -->
  <circle cx="20"  cy="20"  r="1.2" fill="white" opacity="0.7"/>
  <circle cx="55"  cy="12"  r="0.8" fill="white" opacity="0.5"/>
  <circle cx="90"  cy="30"  r="1.0" fill="white" opacity="0.6"/>
  <circle cx="140" cy="18"  r="1.3" fill="white" opacity="0.8"/>
  <circle cx="170" cy="35"  r="0.9" fill="white" opacity="0.55"/>
  <circle cx="30"  cy="50"  r="0.7" fill="white" opacity="0.4"/>
  <circle cx="160" cy="55"  r="1.1" fill="white" opacity="0.65"/>

  <!-- Nube izquierda -->
  <circle cx="28" cy="72" r="13" fill="white" opacity="0.07"/>
  <circle cx="44" cy="65" r="17" fill="white" opacity="0.07"/>
  <circle cx="62" cy="72" r="13" fill="white" opacity="0.07"/>

  <!-- Nube derecha -->
  <circle cx="128" cy="55" r="10" fill="white" opacity="0.06"/>
  <circle cx="144" cy="48" r="14" fill="white" opacity="0.06"/>
  <circle cx="160" cy="55" r="10" fill="white" opacity="0.06"/>

  <!-- Tubería superior -->
  <rect x="130" y="0"   width="40" height="80" fill="url(#pipe)"/>
  <rect x="124" y="54"  width="52" height="26" rx="6" fill="url(#pipe)"/>
  <rect x="137" y="0"   width="8"  height="80" fill="white" opacity="0.08"/>

  <!-- Tubería inferior -->
  <rect x="130" y="126" width="40" height="74" fill="url(#pipe)"/>
  <rect x="124" y="126" width="52" height="26" rx="6" fill="url(#pipe)"/>
  <rect x="137" y="126" width="8"  height="74" fill="white" opacity="0.08"/>

  <!-- Suelo -->
  <rect x="0" y="172" width="200" height="28" fill="#3d2510"/>
  <rect x="0" y="172" width="200" height="12" fill="#4da830"/>

  <!-- Pájaro: cuerpo -->
  <ellipse cx="68" cy="103" rx="18" ry="14" fill="#f5c518"/>
  <!-- Pájaro: panza -->
  <ellipse cx="70" cy="107" rx="11" ry="9" fill="#ffe066"/>
  <!-- Pájaro: ala -->
  <ellipse cx="65" cy="110" rx="10" ry="6" fill="#d4a800" transform="rotate(15,65,110)"/>
  <!-- Pájaro: ojo blanco -->
  <circle cx="78" cy="98" r="6" fill="white"/>
  <!-- Pájaro: pupila -->
  <circle cx="80" cy="98" r="3.2" fill="#111"/>
  <!-- Pájaro: brillo -->
  <circle cx="81.5" cy="96.5" r="1.3" fill="white"/>
  <!-- Pájaro: pico superior -->
  <polygon points="84,100 94,103 84,104" fill="#e8823a"/>
  <!-- Pájaro: pico inferior -->
  <polygon points="84,104 94,103 84,107" fill="#c06428"/>

  <!-- Score decorativo -->
  <text x="100" y="26" font-family="'Courier New', monospace" font-size="22" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.9">3</text>
</svg>
