<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#1e1e38" />
      <stop offset="100%" stop-color="#0a0a14" />
    </radialGradient>

    <!-- Glowing Yellow/Gold Gradient for Active Lights -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffe600" />
      <stop offset="50%" stop-color="#ffb700" />
      <stop offset="100%" stop-color="#ff8800" />
    </linearGradient>

    <!-- Dark/Off Tile Gradient -->
    <linearGradient id="darkTileGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a" />
      <stop offset="100%" stop-color="#15152b" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur1" />
      <feGaussianBlur stdDeviation="25" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Soft Drop Shadow for Tiles -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Outer Rounded Container with border -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)" stroke="#2e2e5a" stroke-width="6" />

  <!-- The Grid Container -->
  <g transform="translate(64, 64)" filter="url(#shadow)">
    
    <!-- Row 1 -->
    <!-- Tile 1 (OFF) -->
    <rect x="16" y="16" width="100" height="100" rx="20" fill="url(#darkTileGrad)" stroke="#3f3f6e" stroke-width="3" />
    
    <!-- Tile 2 (ON) -->
    <rect x="142" y="16" width="100" height="100" rx="20" fill="url(#glowGrad)" filter="url(#neonGlow)" />
    <rect x="142" y="16" width="100" height="100" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />
    
    <!-- Tile 3 (OFF) -->
    <rect x="268" y="16" width="100" height="100" rx="20" fill="url(#darkTileGrad)" stroke="#3f3f6e" stroke-width="3" />

    <!-- Row 2 -->
    <!-- Tile 4 (ON) -->
    <rect x="16" y="142" width="100" height="100" rx="20" fill="url(#glowGrad)" filter="url(#neonGlow)" />
    <rect x="16" y="142" width="100" height="100" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />
    
    <!-- Tile 5 (OFF - Styled as "Just Pressed / Pulsing Cursor") -->
    <rect x="142" y="142" width="100" height="100" rx="20" fill="url(#darkTileGrad)" stroke="#3f3f6e" stroke-width="3" />
    <!-- Press Indicator (Cross/Plus sign showing adjacency toggle direction) -->
    <path d="M 192 167 L 192 217 M 167 192 L 217 192" stroke="#ffb700" stroke-width="6" stroke-linecap="round" opacity="0.4" />
    
    <!-- Tile 6 (ON) -->
    <rect x="268" y="142" width="100" height="100" rx="20" fill="url(#glowGrad)" filter="url(#neonGlow)" />
    <rect x="268" y="142" width="100" height="100" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />

    <!-- Row 3 -->
    <!-- Tile 7 (OFF) -->
    <rect x="16" y="268" width="100" height="100" rx="20" fill="url(#darkTileGrad)" stroke="#3f3f6e" stroke-width="3" />
    
    <!-- Tile 8 (ON) -->
    <rect x="142" y="268" width="100" height="100" rx="20" fill="url(#glowGrad)" filter="url(#neonGlow)" />
    <rect x="142" y="268" width="100" height="100" rx="20" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.8" />
    
    <!-- Tile 9 (OFF) -->
    <rect x="268" y="268" width="100" height="100" rx="20" fill="url(#darkTileGrad)" stroke="#3f3f6e" stroke-width="3" />
  </g>

  <!-- Stylized game controller/interactive glow reflection at the bottom -->
  <path d="M 120 440 Q 256 460 392 440" fill="none" stroke="#ffb700" stroke-width="3" opacity="0.2" filter="url(#neonGlow)" />
</svg>
