<svg viewBox="0 0 400 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Fondo oscuro -->
  <rect width="400" height="400" fill="#1a1a2e"/>
  
  <!-- Líneas del tablero -->
  <line x1="133" y1="40" x2="133" y2="360" stroke="#6b7280" stroke-width="12" stroke-linecap="round"/>
  <line x1="267" y1="40" x2="267" y2="360" stroke="#6b7280" stroke-width="12" stroke-linecap="round"/>
  <line x1="40" y1="133" x2="360" y2="133" stroke="#6b7280" stroke-width="12" stroke-linecap="round"/>
  <line x1="40" y1="267" x2="360" y2="267" stroke="#6b7280" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Fila 1 -->
  <!-- O (arriba-izquierda) -->
  <circle cx="66.5" cy="66.5" r="28" fill="none" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
  
  <!-- X (arriba-centro) -->
  <line x1="160" y1="40" x2="227" y2="93" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  <line x1="227" y1="40" x2="160" y2="93" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  
  <!-- O (arriba-derecha) -->
  <circle cx="333.5" cy="66.5" r="28" fill="none" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
  
  <!-- Fila 2 -->
  <!-- O (centro-izquierda) vacío -->
  
  <!-- O (centro) -->
  <circle cx="200" cy="200" r="28" fill="none" stroke="#8b5cf6" stroke-width="10" stroke-linecap="round"/>
  
  <!-- X (centro-derecha) -->
  <line x1="290" y1="173" x2="360" y2="227" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  <line x1="360" y1="173" x2="290" y2="227" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  
  <!-- Fila 3 -->
  <!-- vacío (abajo-izquierda) -->
  
  <!-- X (abajo-centro) -->
  <line x1="160" y1="307" x2="227" y2="360" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  <line x1="227" y1="307" x2="160" y2="360" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  
  <!-- X (abajo-derecha) -->
  <line x1="290" y1="307" x2="360" y2="360" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
  <line x1="360" y1="307" x2="290" y2="360" stroke="#ff6b6b" stroke-width="12" stroke-linecap="round"/>
</svg>