name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Test
        run: pnpm exec vitest run src/

      - name: Build
        run: pnpm run build

      - name: Copy tools to dist
        run: |
          mkdir -p dist/tools
          cp -r tools/index.html tools/main.js tools/tools.css tools/tools.json tools/shared dist/tools/
          for tool in sprite-cutter animation-previewer theme-studio input-visualizer hitbox-debugger; do
            if [ -d "tools/$tool/dist" ]; then
              mkdir -p "dist/tools/$tool"
              cp -r "tools/$tool/dist/"* "dist/tools/$tool/"
            fi
          done

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
