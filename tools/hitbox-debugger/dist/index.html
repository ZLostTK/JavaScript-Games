<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hitbox Debugger — JavaScript Games</title>
  <meta name="description" content="Overlay visual de regiones interactivas para depurar layouts de menú">
  <style>
    .demo-hint {
      position: fixed;
      left: 12px;
      bottom: 12px;
      max-width: 420px;
      margin: 0;
      padding: 10px 14px;
      font: 12px/1.5 ui-monospace, monospace;
      color: #a0a0b8;
      background: rgba(0, 0, 0, 0.65);
      border: 1px solid #404060;
      border-radius: 6px;
      z-index: 10;
    }
    .demo-hint kbd {
      padding: 1px 5px;
      background: #2a2a40;
      border-radius: 3px;
      color: #e94560;
    }
    .demo-hint code { color: #4ecca3; font-size: 11px; }
  </style>
  <script type="module" crossorigin src="./assets/demo-BBIUTsBN.js"></script>
  <link rel="modulepreload" crossorigin href="./hitbox-debugger.js">
  <link rel="stylesheet" crossorigin href="./assets/demo-C6KfpVoZ.css">
  <link rel="stylesheet" href="../../../engine/game-shell.css">
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
    <button id="back-btn" onclick="location.href='../'">← Tools</button>
  </div>

  <aside class="demo-hint" aria-label="Instrucciones">
    <p>Presiona <kbd>F2</kbd> o <kbd>H</kbd> para activar el overlay.</p>
    <p><kbd>Ctrl+E</kbd> copia el layout JSON al portapapeles.</p>
    <p>Inyectar en juegos: <code>&lt;script src="../../tools/hitbox-debugger/dist/hitbox-debugger.js"&gt;&lt;/script&gt;</code></p>
  </aside>

  <script src="../../../engine/theme.js"></script>
  <script src="../../../engine/render-bridge.js"></script>
  <script src="../../../engine/input.js"></script>
  <script src="../../../engine/ui-canvas.js"></script>
  <script src="../../../engine/engine.js"></script>
  <script src="../../../engine/audio.js"></script>
</body>
</html>
