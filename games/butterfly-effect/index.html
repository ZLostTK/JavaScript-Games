<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Efecto Mariposa - Atractor de Lorenz</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="game-container">
  <canvas id="game"></canvas>
  
  <div class="controls-panel">
    <div class="control-group">
      <label for="speed-slider">Velocidad: <span id="speed-val">1.0x</span></label>
      <input type="range" id="speed-slider" min="0.1" max="5" step="0.1" value="1">
    </div>
    <div class="control-group">
      <label for="points-slider">Puntos: <span id="points-val">3</span></label>
      <input type="range" id="points-slider" min="1" max="100" step="1" value="3">
    </div>
    <div class="control-help">
      <strong>PC:</strong> Clic Izq = Mover | Clic Der = Rotar | Rueda = Zoom<br>
      <strong>Móvil:</strong> 2 Dedos = Mover/Zoom | 1 Dedo = Rotar<br>
      Haz clic en un punto para <strong>seguirlo</strong>.
    </div>
  </div>

  <div class="info-panel" id="info-panel">
    <h1 id="info-title">Siguiendo</h1>
    <p id="info-coords">X: 0.00 | Y: 0.00 | Z: 0.00</p>
    <button id="unfollow-btn">Dejar de seguir</button>
  </div>

  <button id="back-btn" onclick="location.href='../../'">← Volver</button>
</div>

	<script type="module" src="./main.js"></script>
</body>
</html>
